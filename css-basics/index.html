<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Home</title>
        <style>
            h1 {
                color: hsl(0,100%,50%);
                border-style: solid;
                border-width: 1px;
                border-color: red;
            }

            p {
                color: red;
            }

            p.important {
                width: 75%;
            }

            body {
                background-color: dodgerblue;
            }

            .purple-text {
                color: purple;
            }

            .important {
                color: red;
                font-weight: bold;
            }

            #lead-paragraph {
                color: purple;
                font-weight: bold;
            }

            .important:hover {
                background-color: pink;
            }

            a[href^="https"] {
                color: green;
                padding: 1rem;
                background-color: white;
            }

            a[href*="http"] {
                color: red;
            }

            img {
                border-style: dashed;
                border-width: 1px;
                border-color: yellow;
                width: 200px;
            }

        </style>
    </head>
    <body>
        <h1>Welcome!</h1>
        <p class="purple-text">Everything is fine</p>
        <p class="important purple-text">No really, the world is not filled with hopelessness and despair, I promise.</p>
        <p id="lead-paragraph">The world is a happy and sensible place.</p>
        <a href="https://example.com">National WMBA Champions, Seattle Storm</a>
        <a href="http://example2.com">Check out some awesome independent comics</a>
        <img src="image-example.jpg" width="444" height="333" alt="A beautifull nature image">
    </body>
</html>
