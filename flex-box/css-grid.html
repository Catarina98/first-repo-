<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Css Grid Html</title>
    <style>
        .grid-container div{
            border: 1px solid red;
        }
        .grid-container{
            display: grid;
            grid-gap: 20px 30px;

        }
        .grid-item-1 {
            grid-column: 1 / 2;
            grid-row: 1/2;
        }

        .grid-item-2 {
            grid-column: 2 / 3;
            grid-row: 1/2;
        }

        .grid-item-3 {
            grid-column: 1 / span 2;
            grid-row: 3/span 1;
        }

        .grid-item-4 {
            grid-area: 4 / 2 / 5 / 3;
        }

        .grid-container{
            grid-template-columns: 20px 30px 40px 40px;
            grid-template-rows: auto;
            justify-content: space-evenly;
        }
    </style>
</head>

<body>
    <h1>Groups of Animals</h1>
    <div class="grid-container">
        <div class="grid-item-1">
            <h1>One</h1>
        </div>
        <div class="grid-item-2">
            <h1>Two</h1>
        </div>
        <div class="grid-item-3">
            <h1>Three</h1>
        </div>
        <div class="grid-item-4">
            <h1>Four</h1>
        </div>
    </div>
</body>

</html>
